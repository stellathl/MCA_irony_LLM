condition_1:
  task: |
    You will read short stories that describe everyday situations and which finish with a character saying something. Your task is to decide, given the situation, what meaning the character is most likely conveying. Each story will be followed by 4 possible meaning interpretations listed from 1 to 4. Read each story and choose the number corresponding to the most likely meaning. You can only answer with 1, 2, 3, or 4.
    Context: {context}
    Target utterance: {speaker} "{target_utterance}"
    {question}
    {options}
    Do so by following these structures for in-depth analysis:
    1. Understand what is implied in the conversation beyond the literal meaning.
    2. Make a preliminary judgment about what information in the conversation is taken for granted.
    3. Infer what the speaker(s) hope to achieve with their conversation.
    4. Identify what tone the last sentence has (positive or negative).
    5. Evaluate your confidence (0-100%) in your analysis and provide an explanation for this confidence level.
    Answer:
  question: "What meaning is {pronoun} most likely conveying?"

